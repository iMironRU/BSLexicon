<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>BSLexicon</title>
  <!-- Фон: accent палитры приложения (#4ec9b0) -->
  <rect width="32" height="32" rx="6" fill="#4ec9b0"/>
  <!-- {B} собрана из трёх отдельных <text>, чтобы B стояла точно по
       центру скобок: моноширинные fonts могут чуть смещать прописные
       буквы внутри ячейки глифа. Цвет совпадает с переменной bg темы. -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
     font-weight="700"
     text-anchor="middle"
     fill="#1e1e1e">
    <text x="8"  y="23" font-size="22">{</text>
    <text x="16" y="22" font-size="18">B</text>
    <text x="24" y="23" font-size="22">}</text>
  </g>
</svg>
