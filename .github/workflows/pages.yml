name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не отменяем уже идущий продакшен-деплой
concurrency:
  group: pages
  cancel-in-progress: false

# До перехода раннеров на Node 24 по умолчанию (16.06.2026) форсим Node 24 для
# JS-экшенов, иначе сыплются предупреждения о Node 20. После перехода флаг —
# безобидный no-op. Нужен, в частности, для Pages-экшенов (configure-pages /
# upload-pages-artifact / deploy-pages), у которых Node 24-мажоров ещё нет.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Сборка
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Проверки (типы + каталог + тесты)
        run: npm run verify

      - name: Сборка статического бандла
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Деплой
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
