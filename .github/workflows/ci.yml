name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Проверки и сборка
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Установка зависимостей
        run: npm ci

      - name: Типы + инвариант каталога + тесты
        run: npm run verify

      - name: Сборка
        run: npm run build
