# Свойства коллекций — реально читаются/пишутся через точку (`getMember`/`setMember`).
- id: КлючИЗначение.Ключ
  kind: property
  names: { ru: Ключ, en: Key }
  category: Коллекции
  description: >-
    Ключ текущей пары при обходе «Для Каждого» по Структуре или Соответствию.
    Только для чтения.
  returns: { type: Произвольный }
  examples:
    - code: |
        М = Новый Соответствие;
        М["а"] = 1;
        Для Каждого Пара Из М Цикл
            Сообщить(Пара.Ключ);
        КонецЦикла;
      expect: "а"

- id: КлючИЗначение.Значение
  kind: property
  names: { ru: Значение, en: Value }
  category: Коллекции
  description: >-
    Значение текущей пары при обходе «Для Каждого» по Структуре или Соответствию.
    Только для чтения.
  returns: { type: Произвольный }
  examples:
    - code: |
        М = Новый Соответствие;
        М["а"] = 42;
        Для Каждого Пара Из М Цикл
            Сообщить(Пара.Значение);
        КонецЦикла;
      expect: "42"

- id: ЭлементСпискаЗначений.Значение
  kind: property
  names: { ru: Значение, en: Value }
  category: Коллекции
  description: Хранимое значение элемента списка значений. Изменяемое свойство.
  returns: { type: Произвольный }
  examples:
    - code: |
        С = Новый СписокЗначений;
        Э = С.Добавить("первое");
        Э.Значение = "новое";
        Сообщить(Э.Значение);
      expect: "новое"

- id: ЭлементСпискаЗначений.Представление
  kind: property
  names: { ru: Представление, en: Presentation }
  category: Коллекции
  description: >-
    Текстовое представление элемента списка (для UI). При преобразовании элемента
    в строку используется именно оно, если задано. Изменяемое свойство.
  returns: { type: Строка }
  examples:
    - code: |
        С = Новый СписокЗначений;
        Э = С.Добавить(1, "Один");
        Сообщить(Э.Представление);
      expect: "Один"

- id: ЭлементСпискаЗначений.Пометка
  kind: property
  names: { ru: Пометка, en: Check }
  category: Коллекции
  description: Флажок-отметка элемента (Булево). Изменяемое свойство.
  returns: { type: Булево }
  examples:
    - code: |
        С = Новый СписокЗначений;
        Э = С.Добавить("товар");
        Э.Пометка = Истина;
        Сообщить(Э.Пометка);
      expect: "Да"

- id: ТаблицаЗначений.Колонки
  kind: property
  names: { ru: Колонки, en: Columns }
  category: Коллекции
  description: >-
    Коллекция колонок таблицы. Через неё добавляют/удаляют колонки и обращаются
    к ним по имени или индексу.
  returns: { type: КоллекцияКолонокТаблицыЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Товар");
        Т.Колонки.Добавить("Цена");
        Сообщить(Т.Колонки.Количество());
      expect: "2"

- id: КолонкаТаблицыЗначений.Имя
  kind: property
  names: { ru: Имя, en: Name }
  category: Коллекции
  description: >-
    Имя колонки. Переименование синхронно меняет ключи ячеек во всех строках
    таблицы. Изменяемое свойство.
  returns: { type: Строка }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Кол = Т.Колонки.Добавить("Старое");
        Кол.Имя = "Новое";
        Сообщить(Т.Колонки[0].Имя);
      expect: "Новое"

- id: КолонкаТаблицыЗначений.Заголовок
  kind: property
  names: { ru: Заголовок, en: Title }
  category: Коллекции
  description: Заголовок колонки (для отображения). Изменяемое свойство. По умолчанию равен имени.
  returns: { type: Строка }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Кол = Т.Колонки.Добавить("Цена");
        Кол.Заголовок = "Стоимость, ₽";
        Сообщить(Кол.Заголовок);
      expect: "Стоимость, ₽"
