# Коллекции (ссылочные типы). Методы — в catalog/methods/*.yaml.
- id: Массив
  kind: type
  names: { ru: Массив, en: Array }
  category: Коллекции
  description: >-
    Упорядоченный набор значений с доступом по индексу с нуля. Ссылочный тип:
    две переменные с одним массивом видят изменения друг друга. Создаётся через
    «Новый Массив» или «Новый Массив(Размер)».

- id: Структура
  kind: type
  names: { ru: Структура, en: Structure }
  category: Коллекции
  description: >-
    Набор пар «ключ-значение», где ключ — строковый идентификатор
    (регистронезависим). Чтение свойства через точку: Стр.Ключ. Создаётся через
    «Новый Структура» или «Новый Структура("Ключ1,Ключ2", Знач1, Знач2)».

- id: Соответствие
  kind: type
  names: { ru: Соответствие, en: Map }
  category: Коллекции
  description: >-
    Набор пар «ключ-значение» с ключом произвольного типа. Доступ по ключу через
    [ ]; отсутствующий ключ даёт Неопределено. Создаётся через «Новый Соответствие».

- id: КлючИЗначение
  kind: type
  names: { ru: КлючИЗначение, en: KeyAndValue }
  category: Коллекции
  description: >-
    Элемент обхода «Для Каждого» по Структуре или Соответствию. Свойства только
    для чтения: .Ключ и .Значение.

- id: СписокЗначений
  kind: type
  names: { ru: СписокЗначений, en: ValueList }
  category: Коллекции
  description: >-
    Упорядоченный список элементов, у каждого — Значение, Представление и Пометка.
    Доступ к элементу по индексу через [ ]; обход «Для Каждого» даёт элементы.
    Создаётся через «Новый СписокЗначений».

- id: ЭлементСпискаЗначений
  kind: type
  names: { ru: ЭлементСпискаЗначений, en: ValueListItem }
  category: Коллекции
  description: >-
    Элемент списка значений. Изменяемые свойства: .Значение (произвольное),
    .Представление (строка), .Пометка (булево).

- id: ТаблицаЗначений
  kind: type
  names: { ru: ТаблицаЗначений, en: ValueTable }
  category: Коллекции
  description: >-
    Таблица из колонок и строк. Колонки — через свойство .Колонки; строка
    добавляется методом .Добавить() и возвращается для заполнения ячеек.
    Доступ к строке по индексу через [ ], обход «Для Каждого». Создаётся через
    «Новый ТаблицаЗначений».

- id: СтрокаТаблицыЗначений
  kind: type
  names: { ru: СтрокаТаблицыЗначений, en: ValueTableRow }
  category: Коллекции
  description: >-
    Строка таблицы значений. Доступ к ячейке по имени колонки через точку
    (Строка.Цена) или по индексу/имени колонки через [ ]; значения изменяемы.

- id: КолонкаТаблицыЗначений
  kind: type
  names: { ru: КолонкаТаблицыЗначений, en: ValueTableColumn }
  category: Коллекции
  description: >-
    Колонка таблицы значений. Изменяемые свойства: .Имя (переименование
    синхронно меняет ячейки всех строк) и .Заголовок.

- id: КоллекцияКолонокТаблицыЗначений
  kind: type
  names: { ru: КоллекцияКолонокТаблицыЗначений, en: ValueTableColumnCollection }
  category: Коллекции
  description: >-
    Колонки таблицы значений. Добавление/удаление колонки синхронно меняет
    структуру всех строк. Доступ по индексу или имени через [ ], обход «Для Каждого».
