# Коллекции (ссылочные типы). Методы — в catalog/methods/*.yaml.
- id: Массив
  kind: type
  names: { ru: Массив, en: Array }
  category: Коллекции
  description: >-
    Упорядоченный набор значений с доступом по индексу с нуля. Ссылочный тип:
    две переменные с одним массивом видят изменения друг друга. Создаётся через
    «Новый Массив» или «Новый Массив(Размер)».

- id: Структура
  kind: type
  names: { ru: Структура, en: Structure }
  category: Коллекции
  description: >-
    Набор пар «ключ-значение», где ключ — строковый идентификатор
    (регистронезависим). Чтение свойства через точку: Стр.Ключ. Создаётся через
    «Новый Структура» или «Новый Структура("Ключ1,Ключ2", Знач1, Знач2)».

- id: Соответствие
  kind: type
  names: { ru: Соответствие, en: Map }
  category: Коллекции
  description: >-
    Набор пар «ключ-значение» с ключом произвольного типа. Доступ по ключу через
    [ ]; отсутствующий ключ даёт Неопределено. Создаётся через «Новый Соответствие».

- id: КлючИЗначение
  kind: type
  names: { ru: КлючИЗначение, en: KeyAndValue }
  category: Коллекции
  description: >-
    Элемент обхода «Для Каждого» по Структуре или Соответствию. Свойства только
    для чтения: .Ключ и .Значение.

- id: СписокЗначений
  kind: type
  names: { ru: СписокЗначений, en: ValueList }
  category: Коллекции
  description: >-
    Упорядоченный список элементов, у каждого — Значение, Представление и Пометка.
    Доступ к элементу по индексу через [ ]; обход «Для Каждого» даёт элементы.
    Создаётся через «Новый СписокЗначений».

- id: ЭлементСпискаЗначений
  kind: type
  names: { ru: ЭлементСпискаЗначений, en: ValueListItem }
  category: Коллекции
  description: >-
    Элемент списка значений. Изменяемые свойства: .Значение (произвольное),
    .Представление (строка), .Пометка (булево).
