# Примитивные типы (для панели-справочника; в инварианте рантайм↔каталог не участвуют)
- id: Число
  kind: type
  names: { ru: Число, en: Number }
  category: Примитивы
  description: Числовой тип. Целые и дробные значения произвольной точности.

- id: Строка
  kind: type
  names: { ru: Строка, en: String }
  category: Примитивы
  description: Строковый тип. Литералы в двойных кавычках, экранирование — удвоением `""`.

- id: Булево
  kind: type
  names: { ru: Булево, en: Boolean }
  category: Примитивы
  description: Логический тип со значениями `Истина` и `Ложь`.

- id: Дата
  kind: type
  names: { ru: Дата, en: Date }
  category: Примитивы
  description: Дата и время. Литералы вида `'20240101'`, `'20240101120000'`. (Вне скелета MVP.)

- id: Неопределено
  kind: type
  names: { ru: Неопределено, en: Undefined }
  category: Примитивы
  description: Специальное значение «значение не задано». Тип переменной по умолчанию.

- id: "Null"
  kind: type
  names: { ru: "Null", en: "Null" }
  category: Примитивы
  description: Специальное значение пустого результата (например, отсутствующего поля).

- id: Тип
  kind: type
  names: { ru: Тип, en: Type }
  category: Примитивы
  description: Описывает тип значения. Результат функции `ТипЗнч` и оператора `Тип(...)`.
