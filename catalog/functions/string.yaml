# Строковые функции
- id: СокрЛП
  kind: function
  names: { ru: СокрЛП, en: TrimAll }
  category: Строки
  signature: "СокрЛП(Строка): Строка"
  description: Удаляет незначащие пробельные символы в начале и конце строки.
  params:
    - { name: Строка, type: Строка, optional: false, description: Исходная строка }
  returns: { type: Строка, description: Строка без крайних пробелов }
  examples:
    - code: Сообщить("[" + СокрЛП("  ок  ") + "]");
      expect: "[ок]"

- id: ВРег
  kind: function
  names: { ru: ВРег, en: Upper }
  category: Строки
  signature: "ВРег(Строка): Строка"
  description: Переводит все символы строки в верхний регистр.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(ВРег("абвGd"));
      expect: "АБВGD"

- id: НРег
  kind: function
  names: { ru: НРег, en: Lower }
  category: Строки
  signature: "НРег(Строка): Строка"
  description: Переводит все символы строки в нижний регистр.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(НРег("АБВGd"));
      expect: "абвgd"

- id: СтрДлина
  kind: function
  names: { ru: СтрДлина, en: StrLen }
  category: Строки
  signature: "СтрДлина(Строка): Число"
  description: Возвращает количество символов в строке.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(СтрДлина("привет"));
      expect: "6"

- id: СокрЛ
  kind: function
  names: { ru: СокрЛ, en: TrimL }
  category: Строки
  signature: "СокрЛ(Строка): Строка"
  description: Удаляет незначащие пробельные символы в начале строки.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить("[" + СокрЛ("  ок  ") + "]");
      expect: "[ок  ]"

- id: СокрП
  kind: function
  names: { ru: СокрП, en: TrimR }
  category: Строки
  signature: "СокрП(Строка): Строка"
  description: Удаляет незначащие пробельные символы в конце строки.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить("[" + СокрП("  ок  ") + "]");
      expect: "[  ок]"

- id: Лев
  kind: function
  names: { ru: Лев, en: Left }
  category: Строки
  signature: "Лев(Строка, ЧислоСимволов): Строка"
  description: Возвращает первые ЧислоСимволов символов строки.
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: ЧислоСимволов, type: Число, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(Лев("привет", 3));
      expect: "при"

- id: Прав
  kind: function
  names: { ru: Прав, en: Right }
  category: Строки
  signature: "Прав(Строка, ЧислоСимволов): Строка"
  description: Возвращает последние ЧислоСимволов символов строки.
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: ЧислоСимволов, type: Число, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(Прав("привет", 2));
      expect: "ет"

- id: Сред
  kind: function
  names: { ru: Сред, en: Mid }
  category: Строки
  signature: "Сред(Строка, НачальныйНомер, ЧислоСимволов): Строка"
  description: >-
    Возвращает подстроку начиная с позиции НачальныйНомер (с 1). Без
    ЧислоСимволов — до конца строки.
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: НачальныйНомер, type: Число, optional: false }
    - { name: ЧислоСимволов, type: Число, optional: true }
  returns: { type: Строка }
  examples:
    - code: Сообщить(Сред("привет", 2, 3));
      expect: "рив"

- id: СтрНайти
  kind: function
  names: { ru: СтрНайти, en: StrFind }
  category: Строки
  signature: "СтрНайти(Строка, ПодстрокаПоиска): Число"
  description: >-
    Возвращает позицию (с 1) первого вхождения подстроки или 0, если не найдено.
    (Направление поиска и начальная позиция пока не поддержаны.)
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: ПодстрокаПоиска, type: Строка, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(СтрНайти("привет", "ив"));
      expect: "3"
    - code: Сообщить(СтрНайти("привет", "xx"));
      expect: "0"

- id: СтрЗаменить
  kind: function
  names: { ru: СтрЗаменить, en: StrReplace }
  category: Строки
  signature: "СтрЗаменить(Строка, ПодстрокаПоиска, ПодстрокаЗамены): Строка"
  description: Заменяет все вхождения подстроки на строку замены.
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: ПодстрокаПоиска, type: Строка, optional: false }
    - { name: ПодстрокаЗамены, type: Строка, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(СтрЗаменить("а-б-в", "-", "+"));
      expect: "а+б+в"

- id: СтрРазделить
  kind: function
  names: { ru: СтрРазделить, en: StrSplit }
  category: Строки
  signature: "СтрРазделить(Строка, Разделитель, ВключатьПустые): Массив"
  description: >-
    Разбивает строку на Массив подстрок. Каждый символ Разделителя — отдельный
    разделитель. ВключатьПустые (по умолчанию Истина) — оставлять ли пустые части.
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: Разделитель, type: Строка, optional: false }
    - { name: ВключатьПустые, type: Булево, optional: true }
  returns: { type: Массив }
  examples:
    - code: Сообщить(СтрРазделить("a,b,c", ",").Количество());
      expect: "3"

- id: СтрСоединить
  kind: function
  names: { ru: СтрСоединить, en: StrConcat }
  category: Строки
  signature: "СтрСоединить(Строки, Разделитель): Строка"
  description: Соединяет элементы Массива в строку через Разделитель (по умолчанию пустой).
  params:
    - { name: Строки, type: Массив, optional: false }
    - { name: Разделитель, type: Строка, optional: true }
  returns: { type: Строка }
  examples:
    - code: Сообщить(СтрСоединить(СтрРазделить("a,b,c", ","), "|"));
      expect: "a|b|c"

- id: СтрЧислоСтрок
  kind: function
  names: { ru: СтрЧислоСтрок, en: StrLineCount }
  category: Строки
  signature: "СтрЧислоСтрок(Строка): Число"
  description: Возвращает число строк (разделённых переводом строки) в тексте.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(СтрЧислоСтрок("одна строка"));
      expect: "1"

- id: КодСимвола
  kind: function
  names: { ru: КодСимвола, en: CharCode }
  category: Строки
  signature: "КодСимвола(Строка): Число"
  description: Возвращает числовой код первого символа строки (Unicode). Для пустой строки возвращает 0.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(КодСимвола("A"));
      expect: "65"

- id: Символ
  kind: function
  names: { ru: Символ, en: Char }
  category: Строки
  signature: "Символ(КодСимвола): Строка"
  description: Возвращает строку из одного символа по его числовому коду Unicode.
  params:
    - { name: КодСимвола, type: Число, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(Символ(65));
      expect: "A"

- id: ПустаяСтрока
  kind: function
  names: { ru: ПустаяСтрока, en: IsBlankString }
  category: Строки
  signature: "ПустаяСтрока(Строка): Булево"
  description: Возвращает Истина, если строка пустая или состоит только из пробельных символов.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Булево }
  examples:
    - code: Сообщить(ПустаяСтрока("  "));
      expect: "Да"
    - code: Сообщить(ПустаяСтрока("нет"));
      expect: "Нет"

- id: СтрНачинаетсяС
  kind: function
  names: { ru: СтрНачинаетсяС, en: StrStartsWith }
  category: Строки
  signature: "СтрНачинаетсяС(Строка, ПодстрокаПоиска): Булево"
  description: Возвращает Истина, если строка начинается с указанной подстроки (с учётом регистра).
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: ПодстрокаПоиска, type: Строка, optional: false }
  returns: { type: Булево }
  examples:
    - code: Сообщить(СтрНачинаетсяС("привет", "при"));
      expect: "Да"

- id: СтрЗаканчиваетсяНа
  kind: function
  names: { ru: СтрЗаканчиваетсяНа, en: StrEndsWith }
  category: Строки
  signature: "СтрЗаканчиваетсяНа(Строка, ПодстрокаПоиска): Булево"
  description: Возвращает Истина, если строка заканчивается на указанную подстроку (с учётом регистра).
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: ПодстрокаПоиска, type: Строка, optional: false }
  returns: { type: Булево }
  examples:
    - code: Сообщить(СтрЗаканчиваетсяНа("привет", "вет"));
      expect: "Да"

- id: СтрСравнить
  kind: function
  names: { ru: СтрСравнить, en: StrCompare }
  category: Строки
  signature: "СтрСравнить(Строка1, Строка2): Число"
  description: >-
    Сравнивает строки без учёта регистра. Возвращает -1, если Строка1 < Строка2;
    0 — если равны; 1 — если Строка1 > Строка2.
  params:
    - { name: Строка1, type: Строка, optional: false }
    - { name: Строка2, type: Строка, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(СтрСравнить("abc", "ABC"));
      expect: "0"
    - code: Сообщить(СтрСравнить("А", "Б"));
      expect: "-1"

- id: СтрЧислоВхождений
  kind: function
  names: { ru: СтрЧислоВхождений, en: StrOccurrenceCount }
  category: Строки
  signature: "СтрЧислоВхождений(Строка, ПодстрокаПоиска): Число"
  description: Возвращает количество непересекающихся вхождений подстроки в строку. Если подстрока пустая — возвращает 0.
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: ПодстрокаПоиска, type: Строка, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(СтрЧислоВхождений("аааба", "а"));
      expect: "4"

- id: СтрПолучитьСтроку
  kind: function
  names: { ru: СтрПолучитьСтроку, en: StrGetLine }
  category: Строки
  signature: "СтрПолучитьСтроку(Строка, НомерСтроки): Строка"
  description: Возвращает строку с указанным номером (с 1) из многострочного текста. Если номер вне диапазона — пустая строка.
  params:
    - { name: Строка, type: Строка, optional: false }
    - { name: НомерСтроки, type: Число, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(СтрПолучитьСтроку("раз" + Символ(10) + "два", 2));
      expect: "два"

- id: ТРег
  kind: function
  names: { ru: ТРег, en: TitleCase }
  category: Строки
  signature: "ТРег(Строка): Строка"
  description: >-
    Преобразует строку в «заглавный регистр»: первая буква каждого слова —
    прописная, остальные — строчные. Слово начинается после любого не-буквенного символа.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(ТРег("иван петров"));
      expect: "Иван Петров"
