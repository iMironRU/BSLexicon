# Функции форматирования
- id: Формат
  kind: function
  names: { ru: Формат, en: Format }
  category: Форматирование
  signature: "Формат(Значение, СтрокаФормата): Строка"
  description: >-
    Преобразует значение в строку по параметрам форматирования, разделённым «;».
    Числа: ЧЦ=N (знаков после запятой), ЧРД=X (десятичный разделитель),
    ЧРГ=X (разделитель групп), ЧН=X (что выводить вместо нуля).
    Даты: ДФ=шаблон (dd/MM/yyyy/HH/mm/ss).
    Булево: БИ=текст (Истина), БЛ=текст (Ложь).
  params:
    - { name: Значение, type: Произвольный, optional: false }
    - { name: СтрокаФормата, type: Строка, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(Формат(1234.5, "ЧЦ=2; ЧРД=,; ЧРГ= "));
      expect: "1 234,50"
    - code: Сообщить(Формат(Истина, "БИ=Да; БЛ=Нет"));
      expect: "Да"
    - code: Сообщить(Формат(Дата(2024, 3, 15), "ДФ=dd.MM.yyyy"));
      expect: "15.03.2024"

- id: СтрШаблон
  kind: function
  names: { ru: СтрШаблон, en: StrTemplate }
  category: Форматирование
  signature: "СтрШаблон(Шаблон, Значение1, …): Строка"
  description: >-
    Подставляет значения в строку-шаблон: %1 → Значение1, %2 → Значение2 и т.д.
    Неиспользованные метки остаются как есть.
  params:
    - { name: Шаблон, type: Строка, optional: false }
    - { name: Значение1, type: Произвольный, optional: true }
  returns: { type: Строка }
  examples:
    - code: Сообщить(СтрШаблон("Привет, %1! Тебе %2 лет.", "Иван", 30));
      expect: "Привет, Иван! Тебе 30 лет."

- id: СтрокаСЧислом
  kind: function
  names: { ru: СтрокаСЧислом, en: StringWithCount }
  category: Форматирование
  signature: "СтрокаСЧислом(Число, Формы): Строка"
  description: >-
    Выбирает нужную форму слова по числу с учётом русских правил склонения.
    Формы — строка «форма1;форма2;форма5» через «;».
    В каждой форме %1 заменяется на само число.
    Форма1 — для 1 (21, 31…), форма2 — для 2–4 (22–24…), форма5 — для 5–20 и остальных.
  params:
    - { name: Число, type: Число, optional: false }
    - { name: Формы, type: Строка, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(СтрокаСЧислом(1, "%1 яблоко;%1 яблока;%1 яблок"));
      expect: "1 яблоко"
    - code: Сообщить(СтрокаСЧислом(3, "%1 яблоко;%1 яблока;%1 яблок"));
      expect: "3 яблока"
    - code: Сообщить(СтрокаСЧислом(5, "%1 яблоко;%1 яблока;%1 яблок"));
      expect: "5 яблок"
