# Функции преобразования типов
- id: Строка
  kind: function
  names: { ru: Строка, en: String }
  category: Преобразование
  signature: "Строка(Значение): Строка"
  description: Преобразует значение к строке (булево → «Да»/«Нет», Неопределено → пустая строка).
  params:
    - { name: Значение, type: Произвольный, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(Строка(Истина));
      expect: "Да"

- id: Число
  kind: function
  names: { ru: Число, en: Number }
  category: Преобразование
  signature: "Число(Значение): Число"
  description: Преобразует значение к числу. Нечисловая строка даёт 0.
  params:
    - { name: Значение, type: Произвольный, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(Число("42") + 8);
      expect: "50"

- id: Булево
  kind: function
  names: { ru: Булево, en: Boolean }
  category: Преобразование
  signature: "Булево(Значение): Булево"
  description: >-
    Преобразует значение к булевому типу. Строки «Истина»/«Да»/«true» → Истина;
    «Ложь»/«Нет»/«false» → Ложь. Число 0 → Ложь, любое другое → Истина.
    Недопустимая строка вызывает ошибку.
  params:
    - { name: Значение, type: Произвольный, optional: false }
  returns: { type: Булево }
  examples:
    - code: Сообщить(Булево("Да"));
      expect: "Да"
    - code: Сообщить(Булево(0));
      expect: "Нет"
