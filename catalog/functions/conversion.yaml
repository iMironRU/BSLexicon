# Функции преобразования типов
- id: Строка
  kind: function
  names: { ru: Строка, en: String }
  category: Преобразование
  signature: "Строка(Значение): Строка"
  description: Преобразует значение к строке (булево → «Да»/«Нет», Неопределено → пустая строка).
  params:
    - { name: Значение, type: Произвольный, optional: false }
  returns: { type: Строка }
  examples:
    - code: Сообщить(Строка(Истина));
      expect: "Да"

- id: Число
  kind: function
  names: { ru: Число, en: Number }
  category: Преобразование
  signature: "Число(Значение): Число"
  description: Преобразует значение к числу. Нечисловая строка даёт 0.
  params:
    - { name: Значение, type: Произвольный, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(Число("42") + 8);
      expect: "50"

- id: Булево
  kind: function
  names: { ru: Булево, en: Boolean }
  category: Преобразование
  signature: "Булево(Значение): Булево"
  description: >-
    Преобразует значение к булевому типу. Строки «Истина»/«Да»/«true» → Истина;
    «Ложь»/«Нет»/«false» → Ложь. Число 0 → Ложь, любое другое → Истина.
    Недопустимая строка вызывает ошибку.
  params:
    - { name: Значение, type: Произвольный, optional: false }
  returns: { type: Булево }
  examples:
    - code: Сообщить(Булево("Да"));
      expect: "Да"
    - code: Сообщить(Булево(0));
      expect: "Нет"

- id: ЧислоИзДвоичнойСтроки
  kind: function
  names: { ru: ЧислоИзДвоичнойСтроки, en: NumberFromBinaryString }
  category: Преобразование
  signature: "ЧислоИзДвоичнойСтроки(Строка): Число"
  description: Преобразует строку двоичного представления числа (символы «0» и «1») в Число.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(ЧислоИзДвоичнойСтроки("1010"));
      expect: "10"
    - code: Сообщить(ЧислоИзДвоичнойСтроки("11111111"));
      expect: "255"

- id: ЧислоИзШестнадцатеричнойСтроки
  kind: function
  names: { ru: ЧислоИзШестнадцатеричнойСтроки, en: NumberFromHexString }
  category: Преобразование
  signature: "ЧислоИзШестнадцатеричнойСтроки(Строка): Число"
  description: Преобразует строку шестнадцатеричного представления числа в Число. Регистр не важен.
  params:
    - { name: Строка, type: Строка, optional: false }
  returns: { type: Число }
  examples:
    - code: Сообщить(ЧислоИзШестнадцатеричнойСтроки("FF"));
      expect: "255"
    - code: Сообщить(ЧислоИзШестнадцатеричнойСтроки("1A"));
      expect: "26"
