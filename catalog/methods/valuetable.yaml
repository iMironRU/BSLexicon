# Методы ТаблицыЗначений и коллекции её колонок
- id: ТаблицаЗначений.Добавить
  kind: method
  names: { ru: Добавить, en: Add }
  category: ТаблицаЗначений
  signature: "Добавить(): СтрокаТаблицыЗначений"
  description: Добавляет новую пустую строку и возвращает её для заполнения ячеек.
  returns: { type: СтрокаТаблицыЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Товар");
        Т.Колонки.Добавить("Цена");
        Стр = Т.Добавить();
        Стр.Товар = "Хлеб";
        Стр.Цена = 30;
        Стр2 = Т.Добавить();
        Стр2.Товар = "Молоко";
        Стр2.Цена = 70;
        Сообщить(Т.Количество());
        Сообщить(Т.Итог("Цена"));
        Сообщить(Т[0].Товар);
      expect: "2\n100\nХлеб"

- id: ТаблицаЗначений.Количество
  kind: method
  names: { ru: Количество, en: Count }
  category: ТаблицаЗначений
  signature: "Количество(): Число"
  description: Возвращает число строк таблицы.
  returns: { type: Число }

- id: ТаблицаЗначений.Получить
  kind: method
  names: { ru: Получить, en: Get }
  category: ТаблицаЗначений
  signature: "Получить(Индекс): СтрокаТаблицыЗначений"
  description: Возвращает строку по индексу (с нуля). Аналог ТаблицаЗначений[Индекс].
  params:
    - { name: Индекс, type: Число, optional: false }
  returns: { type: СтрокаТаблицыЗначений }

- id: ТаблицаЗначений.Удалить
  kind: method
  names: { ru: Удалить, en: Delete }
  category: ТаблицаЗначений
  signature: "Удалить(СтрокаИлиИндекс)"
  description: Удаляет строку по самой строке или по индексу.
  params:
    - { name: СтрокаИлиИндекс, type: Произвольный, optional: false }

- id: ТаблицаЗначений.Очистить
  kind: method
  names: { ru: Очистить, en: Clear }
  category: ТаблицаЗначений
  signature: "Очистить()"
  description: Удаляет все строки таблицы (колонки остаются).

- id: ТаблицаЗначений.Итог
  kind: method
  names: { ru: Итог, en: Total }
  category: ТаблицаЗначений
  signature: "Итог(ИмяКолонки): Число"
  description: Возвращает сумму числовых значений указанной колонки по всем строкам.
  params:
    - { name: ИмяКолонки, type: Строка, optional: false }
  returns: { type: Число }

- id: ТаблицаЗначений.НайтиСтроки
  kind: method
  names: { ru: НайтиСтроки, en: FindRows }
  category: ТаблицаЗначений
  signature: "НайтиСтроки(ОтборСтруктура): Массив"
  description: >-
    Возвращает Массив строк, удовлетворяющих отбору. Отбор — Структура вида
    «ИмяКолонки = Значение»; учитываются все её условия.
  params:
    - { name: ОтборСтруктура, type: Структура, optional: false }
  returns: { type: Массив }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Имя");
        Т.Колонки.Добавить("Город");
        Р = Т.Добавить(); Р.Имя = "Иван"; Р.Город = "Москва";
        Р = Т.Добавить(); Р.Имя = "Пётр"; Р.Город = "Казань";
        Р = Т.Добавить(); Р.Имя = "Анна"; Р.Город = "Москва";
        Найдено = Т.НайтиСтроки(Новый Структура("Город", "Москва"));
        Сообщить(Найдено.Количество());
      expect: "2"

- id: ТаблицаЗначений.ВыгрузитьКолонку
  kind: method
  names: { ru: ВыгрузитьКолонку, en: UnloadColumn }
  category: ТаблицаЗначений
  signature: "ВыгрузитьКолонку(ИмяКолонки): Массив"
  description: Возвращает Массив значений указанной колонки по всем строкам.
  params:
    - { name: ИмяКолонки, type: Строка, optional: false }
  returns: { type: Массив }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Число");
        Р = Т.Добавить(); Р.Число = 5;
        Р = Т.Добавить(); Р.Число = 7;
        Сообщить(СтрСоединить(Т.ВыгрузитьКолонку("Число"), "+"));
      expect: "5+7"

- id: ТаблицаЗначений.Вставить
  kind: method
  names: { ru: Вставить, en: Insert }
  category: ТаблицаЗначений
  signature: "Вставить(Индекс): СтрокаТаблицыЗначений"
  description: Вставляет новую пустую строку по указанному индексу и возвращает её.
  params:
    - { name: Индекс, type: Число, optional: false }
  returns: { type: СтрокаТаблицыЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Н");
        Р = Т.Добавить(); Р.Н = "последняя";
        Первая = Т.Вставить(0);
        Первая.Н = "первая";
        Сообщить(Т[0].Н);
        Сообщить(Т[1].Н);
      expect: "первая\nпоследняя"

- id: ТаблицаЗначений.Индекс
  kind: method
  names: { ru: Индекс, en: IndexOf }
  category: ТаблицаЗначений
  signature: "Индекс(Строка): Число"
  description: Возвращает индекс строки в таблице (с нуля). Если строка не принадлежит таблице — −1.
  params:
    - { name: Строка, type: СтрокаТаблицыЗначений, optional: false }
  returns: { type: Число }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Н");
        Т.Добавить();
        Р = Т.Добавить();
        Сообщить(Т.Индекс(Р));
      expect: "1"

- id: ТаблицаЗначений.Найти
  kind: method
  names: { ru: Найти, en: Find }
  category: ТаблицаЗначений
  signature: "Найти(Значение, Колонки?): СтрокаТаблицыЗначений"
  description: >-
    Ищет первую строку, в которой хотя бы в одной из указанных колонок
    содержится заданное значение. Возвращает строку или Неопределено.
    Если Колонки не указаны — ищет по всем.
  params:
    - { name: Значение, type: Произвольный, optional: false }
    - { name: Колонки, type: Строка, optional: true, description: "Список имён через запятую" }
  returns: { type: СтрокаТаблицыЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Имя");
        Р = Т.Добавить(); Р.Имя = "Петров";
        Р = Т.Добавить(); Р.Имя = "Иванов";
        Найден = Т.Найти("Иванов");
        Сообщить(Найден.Имя);
        Сообщить(Т.Найти("Неизвестный") = Неопределено);
      expect: "Иванов\nДа"

- id: ТаблицаЗначений.Сдвинуть
  kind: method
  names: { ru: Сдвинуть, en: Move }
  category: ТаблицаЗначений
  signature: "Сдвинуть(Строка, Смещение)"
  description: Перемещает строку на Смещение позиций (положительное — вниз, отрицательное — вверх). Индекс зажимается в допустимые границы.
  params:
    - { name: Строка, type: СтрокаТаблицыЗначений, optional: false }
    - { name: Смещение, type: Число, optional: false }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Н");
        Р0 = Т.Добавить(); Р0.Н = "А";
        Р1 = Т.Добавить(); Р1.Н = "Б";
        Р2 = Т.Добавить(); Р2.Н = "В";
        Т.Сдвинуть(Р0, 2);
        Сообщить(Т[0].Н + Т[1].Н + Т[2].Н);
      expect: "БВА"

- id: ТаблицаЗначений.Скопировать
  kind: method
  names: { ru: Скопировать, en: Copy }
  category: ТаблицаЗначений
  signature: "Скопировать(Строки?, Колонки?): ТаблицаЗначений"
  description: >-
    Создаёт копию таблицы. Необязательный параметр Строки — Массив строк для копирования;
    если не указан — копируются все. Необязательный параметр Колонки — список имён колонок
    через запятую; если не указан — копируются все.
  params:
    - { name: Строки, type: Массив, optional: true }
    - { name: Колонки, type: Строка, optional: true }
  returns: { type: ТаблицаЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("А"); Т.Колонки.Добавить("Б");
        Р = Т.Добавить(); Р.А = 1; Р.Б = 2;
        К = Т.Скопировать();
        Сообщить(К.Количество());
        Сообщить(К[0].А);
      expect: "1\n1"

- id: ТаблицаЗначений.СкопироватьКолонки
  kind: method
  names: { ru: СкопироватьКолонки, en: CopyColumns }
  category: ТаблицаЗначений
  signature: "СкопироватьКолонки(Колонки?): ТаблицаЗначений"
  description: >-
    Создаёт новую пустую таблицу с той же структурой колонок (без строк).
    Если Колонки указаны — копирует только перечисленные.
  params:
    - { name: Колонки, type: Строка, optional: true, description: "Список имён через запятую" }
  returns: { type: ТаблицаЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("X"); Т.Колонки.Добавить("Y");
        Т.Добавить();
        Пустая = Т.СкопироватьКолонки();
        Сообщить(Пустая.Колонки.Количество());
        Сообщить(Пустая.Количество());
      expect: "2\n0"

- id: ТаблицаЗначений.Сортировать
  kind: method
  names: { ru: Сортировать, en: Sort }
  category: ТаблицаЗначений
  signature: "Сортировать(Колонки)"
  description: >-
    Сортирует строки по указанным колонкам. Строка «Цена убыв, Имя» означает:
    сначала по Цене по убыванию, затем по Имени по возрастанию.
    Направление: «возр»/«asc» или «убыв»/«desc» (по умолчанию — возрастание).
  params:
    - { name: Колонки, type: Строка, optional: false, description: "«Имя [убыв|возр], …»" }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Н");
        Р = Т.Добавить(); Р.Н = 3;
        Р = Т.Добавить(); Р.Н = 1;
        Р = Т.Добавить(); Р.Н = 2;
        Т.Сортировать("Н");
        Сообщить(Т[0].Н); Сообщить(Т[1].Н); Сообщить(Т[2].Н);
      expect: "1\n2\n3"

- id: ТаблицаЗначений.ЗагрузитьКолонку
  kind: method
  names: { ru: ЗагрузитьКолонку, en: LoadColumn }
  category: ТаблицаЗначений
  signature: "ЗагрузитьКолонку(Массив, ИмяКолонки)"
  description: Заполняет колонку значениями из Массива. Лишние значения игнорируются; лишние строки остаются без изменений.
  params:
    - { name: Массив, type: Массив, optional: false }
    - { name: ИмяКолонки, type: Строка, optional: false }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Цена");
        Т.Добавить(); Т.Добавить();
        М = Новый Массив;
        М.Добавить(10);
        М.Добавить(20);
        Т.ЗагрузитьКолонку(М, "Цена");
        Сообщить(Т[0].Цена);
        Сообщить(Т[1].Цена);
      expect: "10\n20"

- id: ТаблицаЗначений.ЗаполнитьЗначения
  kind: method
  names: { ru: ЗаполнитьЗначения, en: FillValues }
  category: ТаблицаЗначений
  signature: "ЗаполнитьЗначения(Значение, Колонки?)"
  description: Устанавливает одно значение во все строки таблицы. Если Колонки указаны — только в перечисленные.
  params:
    - { name: Значение, type: Произвольный, optional: false }
    - { name: Колонки, type: Строка, optional: true, description: "Список имён через запятую" }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Флаг");
        Т.Добавить(); Т.Добавить();
        Т.ЗаполнитьЗначения(Истина, "Флаг");
        Сообщить(Т[0].Флаг);
        Сообщить(Т[1].Флаг);
      expect: "Да\nДа"

- id: ТаблицаЗначений.Свернуть
  kind: method
  names: { ru: Свернуть, en: GroupBy }
  category: ТаблицаЗначений
  signature: "Свернуть(КолонкиГруппировки, КолонкиСуммирования?)"
  description: >-
    Группирует строки по КолонкиГруппировки (список имён через запятую) и суммирует
    значения КолонкиСуммирования. Строки заменяются сгруппированными; порядок совпадает
    с порядком первого вхождения каждой группы.
  params:
    - { name: КолонкиГруппировки, type: Строка, optional: false }
    - { name: КолонкиСуммирования, type: Строка, optional: true }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Вид"); Т.Колонки.Добавить("Сумма");
        Р = Т.Добавить(); Р.Вид = "А"; Р.Сумма = 10;
        Р = Т.Добавить(); Р.Вид = "Б"; Р.Сумма = 20;
        Р = Т.Добавить(); Р.Вид = "А"; Р.Сумма = 30;
        Т.Свернуть("Вид", "Сумма");
        Сообщить(Т.Количество());
        Сообщить(Т[0].Вид + "=" + Т[0].Сумма);
        Сообщить(Т[1].Вид + "=" + Т[1].Сумма);
      expect: "2\nА=40\nБ=20"

- id: КоллекцияКолонокТаблицыЗначений.Вставить
  kind: method
  names: { ru: Вставить, en: Insert }
  category: КолонкиТЗ
  signature: "Вставить(Индекс, Имя, Тип?, Заголовок?): КолонкаТаблицыЗначений"
  description: Вставляет новую колонку по указанному индексу и возвращает её. Тип не моделируется.
  params:
    - { name: Индекс, type: Число, optional: false }
    - { name: Имя, type: Строка, optional: false }
    - { name: Тип, type: Произвольный, optional: true }
    - { name: Заголовок, type: Строка, optional: true }
  returns: { type: КолонкаТаблицыЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Б");
        Т.Колонки.Вставить(0, "А");
        Сообщить(Т.Колонки[0].Имя);
        Сообщить(Т.Колонки[1].Имя);
      expect: "А\nБ"

- id: КоллекцияКолонокТаблицыЗначений.Индекс
  kind: method
  names: { ru: Индекс, en: IndexOf }
  category: КолонкиТЗ
  signature: "Индекс(Колонка): Число"
  description: Возвращает индекс колонки в коллекции (с нуля).
  params:
    - { name: Колонка, type: КолонкаТаблицыЗначений, optional: false }
  returns: { type: Число }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("X");
        Кол = Т.Колонки.Добавить("Y");
        Сообщить(Т.Колонки.Индекс(Кол));
      expect: "1"

- id: КоллекцияКолонокТаблицыЗначений.Найти
  kind: method
  names: { ru: Найти, en: Find }
  category: КолонкиТЗ
  signature: "Найти(Имя): КолонкаТаблицыЗначений"
  description: Возвращает колонку по имени или Неопределено, если не найдена.
  params:
    - { name: Имя, type: Строка, optional: false }
  returns: { type: КолонкаТаблицыЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("Цена");
        Кол = Т.Колонки.Найти("Цена");
        Сообщить(Кол.Имя);
        Сообщить(Т.Колонки.Найти("Нет") = Неопределено);
      expect: "Цена\nДа"

- id: КоллекцияКолонокТаблицыЗначений.Очистить
  kind: method
  names: { ru: Очистить, en: Clear }
  category: КолонкиТЗ
  signature: "Очистить()"
  description: Удаляет все колонки и очищает ячейки всех строк.
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("А"); Т.Колонки.Добавить("Б");
        Т.Колонки.Очистить();
        Сообщить(Т.Колонки.Количество());
      expect: "0"

- id: КоллекцияКолонокТаблицыЗначений.Сдвинуть
  kind: method
  names: { ru: Сдвинуть, en: Move }
  category: КолонкиТЗ
  signature: "Сдвинуть(Колонка, Смещение)"
  description: Перемещает колонку на Смещение позиций (положительное — вправо, отрицательное — влево). Индекс зажимается в допустимые границы.
  params:
    - { name: Колонка, type: КолонкаТаблицыЗначений, optional: false }
    - { name: Смещение, type: Число, optional: false }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("А"); Т.Колонки.Добавить("Б"); Т.Колонки.Добавить("В");
        Т.Колонки.Сдвинуть(Т.Колонки[0], 2);
        Сообщить(Т.Колонки[0].Имя + Т.Колонки[1].Имя + Т.Колонки[2].Имя);
      expect: "БВА"

- id: КоллекцияКолонокТаблицыЗначений.Добавить
  kind: method
  names: { ru: Добавить, en: Add }
  category: КолонкиТЗ
  signature: "Добавить(Имя, Тип, Заголовок): КолонкаТаблицыЗначений"
  description: >-
    Добавляет колонку с указанным именем и возвращает её. Тип не моделируется
    тренажёром; Заголовок по умолчанию равен имени.
  params:
    - { name: Имя, type: Строка, optional: false }
    - { name: Тип, type: Произвольный, optional: true }
    - { name: Заголовок, type: Строка, optional: true }
  returns: { type: КолонкаТаблицыЗначений }
  examples:
    - code: |
        Т = Новый ТаблицаЗначений;
        Т.Колонки.Добавить("A");
        Т.Колонки.Добавить("B");
        Сообщить(Т.Колонки.Количество());
        Сообщить(Т.Колонки[1].Имя);
      expect: "2\nB"

- id: КоллекцияКолонокТаблицыЗначений.Количество
  kind: method
  names: { ru: Количество, en: Count }
  category: КолонкиТЗ
  signature: "Количество(): Число"
  description: Возвращает число колонок таблицы.
  returns: { type: Число }

- id: КоллекцияКолонокТаблицыЗначений.Получить
  kind: method
  names: { ru: Получить, en: Get }
  category: КолонкиТЗ
  signature: "Получить(Индекс): КолонкаТаблицыЗначений"
  description: Возвращает колонку по индексу (с нуля). Аналог Колонки[Индекс].
