# Методы типа СписокЗначений
- id: СписокЗначений.Добавить
  kind: method
  names: { ru: Добавить, en: Add }
  category: СписокЗначений
  signature: "Добавить(Значение, Представление, Пометка): ЭлементСпискаЗначений"
  description: >-
    Добавляет элемент в конец списка и возвращает его. Представление (строка) и
    Пометка (булево) необязательны.
  params:
    - { name: Значение, type: Произвольный, optional: false }
    - { name: Представление, type: Строка, optional: true }
    - { name: Пометка, type: Булево, optional: true }
  returns: { type: ЭлементСпискаЗначений }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(10, "десять");
        Сп.Добавить(20);
        Сообщить(Сп.Количество());
        Сообщить(Сп[0].Значение);
        Сообщить(Сп[0].Представление);
      expect: "2\n10\nдесять"

- id: СписокЗначений.Количество
  kind: method
  names: { ru: Количество, en: Count }
  category: СписокЗначений
  signature: "Количество(): Число"
  description: Возвращает число элементов списка.
  returns: { type: Число }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(10); Сп.Добавить(20);
        Итог = 0;
        Для Каждого Эл Из Сп Цикл
            Итог = Итог + Эл.Значение;
        КонецЦикла;
        Сообщить(Итог);
      expect: "30"

- id: СписокЗначений.Получить
  kind: method
  names: { ru: Получить, en: Get }
  category: СписокЗначений
  signature: "Получить(Индекс): ЭлементСпискаЗначений"
  description: Возвращает элемент по индексу (с нуля). Аналог СписокЗначений[Индекс].
  params:
    - { name: Индекс, type: Число, optional: false }
  returns: { type: ЭлементСпискаЗначений }

- id: СписокЗначений.Вставить
  kind: method
  names: { ru: Вставить, en: Insert }
  category: СписокЗначений
  signature: "Вставить(Индекс, Значение, Представление, Пометка): ЭлементСпискаЗначений"
  description: Вставляет новый элемент в указанную позицию и возвращает его.
  params:
    - { name: Индекс, type: Число, optional: false }
    - { name: Значение, type: Произвольный, optional: false }
    - { name: Представление, type: Строка, optional: true }
    - { name: Пометка, type: Булево, optional: true }
  returns: { type: ЭлементСпискаЗначений }

- id: СписокЗначений.Удалить
  kind: method
  names: { ru: Удалить, en: Delete }
  category: СписокЗначений
  signature: "Удалить(ЭлементИлиИндекс)"
  description: Удаляет элемент списка по самому элементу или по индексу.
  params:
    - { name: ЭлементИлиИндекс, type: Произвольный, optional: false }

- id: СписокЗначений.Очистить
  kind: method
  names: { ru: Очистить, en: Clear }
  category: СписокЗначений
  signature: "Очистить()"
  description: Удаляет все элементы списка.

- id: СписокЗначений.НайтиПоЗначению
  kind: method
  names: { ru: НайтиПоЗначению, en: FindByValue }
  category: СписокЗначений
  signature: "НайтиПоЗначению(Значение): ЭлементСпискаЗначений"
  description: Возвращает первый элемент с указанным значением или Неопределено.
  params:
    - { name: Значение, type: Произвольный, optional: false }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(5);
        Эл = Сп.НайтиПоЗначению(5);
        Эл.Пометка = Истина;
        Сообщить(Сп[0].Пометка);
      expect: "Да"

- id: СписокЗначений.Индекс
  kind: method
  names: { ru: Индекс, en: IndexOf }
  category: СписокЗначений
  signature: "Индекс(Элемент): Число"
  description: Возвращает индекс элемента в списке (−1, если элемент не из этого списка).
  params:
    - { name: Элемент, type: ЭлементСпискаЗначений, optional: false }
  returns: { type: Число }

- id: СписокЗначений.ВыгрузитьЗначения
  kind: method
  names: { ru: ВыгрузитьЗначения, en: UnloadValues }
  category: СписокЗначений
  signature: "ВыгрузитьЗначения(): Массив"
  description: Возвращает Массив значений всех элементов списка.
  returns: { type: Массив }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(1); Сп.Добавить(2); Сп.Добавить(3);
        Сообщить(Сп.ВыгрузитьЗначения().Количество());
      expect: "3"

- id: СписокЗначений.ЗагрузитьЗначения
  kind: method
  names: { ru: ЗагрузитьЗначения, en: LoadValues }
  category: СписокЗначений
  signature: "ЗагрузитьЗначения(МассивЗначений)"
  description: >-
    Очищает список и заполняет его элементами из Массива. Каждый элемент массива
    становится значением нового элемента списка (представление и пометка — пустые).
  params:
    - { name: МассивЗначений, type: Массив, optional: false }
  examples:
    - code: |
        М = Новый Массив;
        М.Добавить("а"); М.Добавить("б"); М.Добавить("в");
        Сп = Новый СписокЗначений;
        Сп.ЗагрузитьЗначения(М);
        Сообщить(Сп.Количество());
        Сообщить(Сп[1].Значение);
      expect: "3\nб"

- id: СписокЗначений.ЗаполнитьПометки
  kind: method
  names: { ru: ЗаполнитьПометки, en: FillChecks }
  category: СписокЗначений
  signature: "ЗаполнитьПометки(ЗначениеПометки)"
  description: Устанавливает свойство «Пометка» всех элементов списка в заданное булево значение.
  params:
    - { name: ЗначениеПометки, type: Булево, optional: false }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(1); Сп.Добавить(2); Сп.Добавить(3);
        Сп.ЗаполнитьПометки(Истина);
        Сообщить(Сп[0].Пометка);
        Сообщить(Сп[2].Пометка);
      expect: "Да\nДа"

- id: СписокЗначений.Сдвинуть
  kind: method
  names: { ru: Сдвинуть, en: Move }
  category: СписокЗначений
  signature: "Сдвинуть(Элемент, Смещение)"
  description: >-
    Смещает элемент (по объекту или индексу) на указанное количество позиций
    (положительное — вниз по списку, отрицательное — вверх). Не выходит за границы.
  params:
    - { name: Элемент, type: Произвольный, optional: false }
    - { name: Смещение, type: Число, optional: false }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить("а"); Сп.Добавить("б"); Сп.Добавить("в");
        Сп.Сдвинуть(0, 2);
        Сообщить(Сп[0].Значение);
        Сообщить(Сп[2].Значение);
      expect: "б\nа"

- id: СписокЗначений.Скопировать
  kind: method
  names: { ru: Скопировать, en: Copy }
  category: СписокЗначений
  signature: "Скопировать(): СписокЗначений"
  description: Возвращает новый список значений — полную независимую копию текущего.
  returns: { type: СписокЗначений }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(10); Сп.Добавить(20);
        Коп = Сп.Скопировать();
        Коп.Добавить(30);
        Сообщить(Сп.Количество());
        Сообщить(Коп.Количество());
      expect: "2\n3"

- id: СписокЗначений.СортироватьПоЗначению
  kind: method
  names: { ru: СортироватьПоЗначению, en: SortByValue }
  category: СписокЗначений
  signature: "СортироватьПоЗначению(Направление)"
  description: >-
    Сортирует элементы списка по значению. Направление: 0 или «Возрастание» —
    по возрастанию (по умолчанию), 1 или «Убывание» — по убыванию.
  params:
    - { name: Направление, type: Число, optional: true }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(3); Сп.Добавить(1); Сп.Добавить(2);
        Сп.СортироватьПоЗначению();
        Сообщить(Сп[0].Значение);
        Сообщить(Сп[2].Значение);
      expect: "1\n3"

- id: СписокЗначений.СортироватьПоПредставлению
  kind: method
  names: { ru: СортироватьПоПредставлению, en: SortByPresentation }
  category: СписокЗначений
  signature: "СортироватьПоПредставлению(Направление)"
  description: >-
    Сортирует элементы списка по представлению (строке). Если представление пустое,
    используется строковое представление значения. Направление аналогично СортироватьПоЗначению.
  params:
    - { name: Направление, type: Число, optional: true }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(1, "яблоко");
        Сп.Добавить(2, "банан");
        Сп.Добавить(3, "вишня");
        Сп.СортироватьПоПредставлению();
        Сообщить(Сп[0].Представление);
        Сообщить(Сп[2].Представление);
      expect: "банан\nяблоко"
