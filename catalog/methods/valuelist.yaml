# Методы типа СписокЗначений
- id: СписокЗначений.Добавить
  kind: method
  names: { ru: Добавить, en: Add }
  category: СписокЗначений
  signature: "Добавить(Значение, Представление, Пометка): ЭлементСпискаЗначений"
  description: >-
    Добавляет элемент в конец списка и возвращает его. Представление (строка) и
    Пометка (булево) необязательны.
  params:
    - { name: Значение, type: Произвольный, optional: false }
    - { name: Представление, type: Строка, optional: true }
    - { name: Пометка, type: Булево, optional: true }
  returns: { type: ЭлементСпискаЗначений }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(10, "десять");
        Сп.Добавить(20);
        Сообщить(Сп.Количество());
        Сообщить(Сп[0].Значение);
        Сообщить(Сп[0].Представление);
      expect: "2\n10\nдесять"

- id: СписокЗначений.Количество
  kind: method
  names: { ru: Количество, en: Count }
  category: СписокЗначений
  signature: "Количество(): Число"
  description: Возвращает число элементов списка.
  returns: { type: Число }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(10); Сп.Добавить(20);
        Итог = 0;
        Для Каждого Эл Из Сп Цикл
            Итог = Итог + Эл.Значение;
        КонецЦикла;
        Сообщить(Итог);
      expect: "30"

- id: СписокЗначений.Получить
  kind: method
  names: { ru: Получить, en: Get }
  category: СписокЗначений
  signature: "Получить(Индекс): ЭлементСпискаЗначений"
  description: Возвращает элемент по индексу (с нуля). Аналог СписокЗначений[Индекс].
  params:
    - { name: Индекс, type: Число, optional: false }
  returns: { type: ЭлементСпискаЗначений }

- id: СписокЗначений.Вставить
  kind: method
  names: { ru: Вставить, en: Insert }
  category: СписокЗначений
  signature: "Вставить(Индекс, Значение, Представление, Пометка): ЭлементСпискаЗначений"
  description: Вставляет новый элемент в указанную позицию и возвращает его.
  params:
    - { name: Индекс, type: Число, optional: false }
    - { name: Значение, type: Произвольный, optional: false }
    - { name: Представление, type: Строка, optional: true }
    - { name: Пометка, type: Булево, optional: true }
  returns: { type: ЭлементСпискаЗначений }

- id: СписокЗначений.Удалить
  kind: method
  names: { ru: Удалить, en: Delete }
  category: СписокЗначений
  signature: "Удалить(ЭлементИлиИндекс)"
  description: Удаляет элемент списка по самому элементу или по индексу.
  params:
    - { name: ЭлементИлиИндекс, type: Произвольный, optional: false }

- id: СписокЗначений.Очистить
  kind: method
  names: { ru: Очистить, en: Clear }
  category: СписокЗначений
  signature: "Очистить()"
  description: Удаляет все элементы списка.

- id: СписокЗначений.НайтиПоЗначению
  kind: method
  names: { ru: НайтиПоЗначению, en: FindByValue }
  category: СписокЗначений
  signature: "НайтиПоЗначению(Значение): ЭлементСпискаЗначений"
  description: Возвращает первый элемент с указанным значением или Неопределено.
  params:
    - { name: Значение, type: Произвольный, optional: false }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(5);
        Эл = Сп.НайтиПоЗначению(5);
        Эл.Пометка = Истина;
        Сообщить(Сп[0].Пометка);
      expect: "Да"

- id: СписокЗначений.Индекс
  kind: method
  names: { ru: Индекс, en: IndexOf }
  category: СписокЗначений
  signature: "Индекс(Элемент): Число"
  description: Возвращает индекс элемента в списке (−1, если элемент не из этого списка).
  params:
    - { name: Элемент, type: ЭлементСпискаЗначений, optional: false }
  returns: { type: Число }

- id: СписокЗначений.ВыгрузитьЗначения
  kind: method
  names: { ru: ВыгрузитьЗначения, en: UnloadValues }
  category: СписокЗначений
  signature: "ВыгрузитьЗначения(): Массив"
  description: Возвращает Массив значений всех элементов списка.
  returns: { type: Массив }
  examples:
    - code: |
        Сп = Новый СписокЗначений;
        Сп.Добавить(1); Сп.Добавить(2); Сп.Добавить(3);
        Сообщить(Сп.ВыгрузитьЗначения().Количество());
      expect: "3"
